name: Docker CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Check out code
      - name: Build Docker image
        run: docker build -t my-nginx ./nginx-demo
      - name: Run Docker container
        run: docker run -d -p 8080:80 --name my-nginx
jobs:
  logs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        name: Check out code
      - name: Fetch Docker logs
        run: docker logs my-nginx
jobs:
  deploy:
  
    runs-on: ubuntu-latest
    needs: logs

    steps:
      - uses: actions/checkout@v4
        name: Check out code
      - name: Deploy to server
        run: echo "Deploying to server..." # Replace with actual deployment commands