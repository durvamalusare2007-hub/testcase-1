name: Docker CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-nginx ./nginx-demo

      - name: Run container
        run: docker run -d -p 8080:80 --name my-nginx my-nginx

      - name: Wait for container
        run: sleep 5

      - name: Check logs
        run: docker logs my-nginx

      - name: Test app
        run: curl -I http://localhost:8080

      - name: Stop container
        run: docker stop my-nginx && docker rm my-nginx

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Deploy step
        run: echo "Deploying to server..."